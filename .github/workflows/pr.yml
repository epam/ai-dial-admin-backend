name: PR Workflow

on:
  pull_request:
    branches: [development, release-*]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  run_tests:
    uses: epam/ai-dial-ci/.github/workflows/java_pr.yml@4.6.0
    with:
      ort-version: "85.0.0"
    secrets: inherit