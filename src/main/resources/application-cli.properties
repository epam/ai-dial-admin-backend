# CLI mode: no web server, ephemeral in-memory H2, all background services disabled

# Datasource - always H2 in-memory for CLI (ephemeral, no credentials needed)
datasource.vendor=H2
h2.datasource.url=jdbc:h2:mem:cli-validation;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
h2.datasource.username=sa
h2.datasource.password=
h2.datasource.masterKey=
h2.datasource.encryptedFileKey=

# Disable config export scheduler
config.export.enabled=false
config.reload.enabled=false
config.autoReload.enabled=false

# Disable auto-import (CLI validate command handles this directly)
config.import.autoImportOnBootstrap.enabled=false

# Disable security (no HTTP endpoints in CLI mode)
config.rest.security.mode=none

# Disable actuator and metrics
management.endpoints.web.exposure.include=
metrics.enabled=false

# No web server in CLI mode
spring.main.web-application-type=none
spring.main.banner-mode=off

# Suppress unnecessary startup noise
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.org.flywaydb=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
logging.level.com.epam.aidial.cfg=WARN
# Suppress BeanPostProcessorChecker WARNs — cosmetic warnings about bean ordering with meterRegistry.
# The logger is named with a $inner suffix which is NOT a child of the outer class in the hierarchy;
# silencing the entire package is the reliable way to suppress it.
logging.level.org.springframework.context.support=ERROR

# --- Startup optimisations (CLI-specific) ---

# JMX adds startup overhead - disable unless you're using JMX monitoring
spring.jmx.enabled=false

# Task 2: Disable Hibernate Envers audit integration — CLI never writes or reads audit history.
# @Audited annotations are ignored; Flyway-created *_aud / revinfo tables remain but are unused.
spring.jpa.properties.hibernate.integration.envers.enabled=false

# Task 3: Exclude Spring Cloud auto-configurations not needed in CLI mode.
# These cause 3-4s of overhead and produce BeanPostProcessorChecker WARN noise.
# RefreshAutoConfiguration is what actually registers GenericScope (still showed in logs after
# the initial exclusions — the LB exclusions were necessary but not sufficient).
spring.autoconfigure.exclude=\
  org.springframework.cloud.client.loadbalancer.LoadBalancerAutoConfiguration,\
  org.springframework.cloud.client.loadbalancer.reactive.LoadBalancerBeanPostProcessorAutoConfiguration,\
  org.springframework.cloud.commons.config.CommonsConfigAutoConfiguration,\
  org.springframework.cloud.client.CommonsClientAutoConfiguration,\
  org.springframework.cloud.client.serviceregistry.ServiceRegistryAutoConfiguration,\
  org.springframework.cloud.autoconfigure.RefreshAutoConfiguration,\
  org.springframework.cloud.autoconfigure.RefreshEndpointAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.metrics.MetricsAutoConfiguration

# Task 5: Defer all bean creation to first access.
# Safe in CLI mode: all background schedulers/exporters are already disabled.
spring.main.lazy-initialization=true

# Disable AOP method-tracing interceptor — no value in a short-lived CLI process.
# The default in application.properties is true (${CUSTOMIZABLE_TRACE_INTERCEPTOR_ENABLED:true}).
com.epam.aidial.cfg.configuration.customizable-trace-interceptor.enabled=false
